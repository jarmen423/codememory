name: Release & Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: ubuntu-latest
            target: linux-arm64
          - os: macos-latest
            target: darwin-amd64
          - os: macos-latest
            target: darwin-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build binary (PyInstaller starter)
        run: |
          pyinstaller --onefile --name codememory src/codememory/cli.py

      - name: Package
        run: |
          mkdir -p dist/release
          cp dist/codememory dist/release/
          cd dist/release
          tar -czf codememory-${{ matrix.target }}.tar.gz codememory

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codememory-${{ matrix.target }}
          path: dist/release/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
