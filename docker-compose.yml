# codememory + Neo4j (Production-ready)
# Usage:
#   docker compose up -d          # Start Neo4j
#   docker compose run --rm codememory index /workspace
#   docker compose run --rm codememory serve --repo /workspace

version: "3.8"

services:
  neo4j:
    image: neo4j:5.25-community
    container_name: codememory-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codememory-net

  codememory:
    build: .
    container_name: codememory
    volumes:
      - ${CODEMEMORY_WORKSPACE:-.}:/workspace
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - codememory-net
    profiles:
      - tools   # Only start when explicitly requested

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  codememory-net:
    driver: bridge
